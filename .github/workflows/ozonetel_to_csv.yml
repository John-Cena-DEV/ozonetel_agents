name: Fetch Ozonetel Report

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight. Adjust as needed.
  workflow_dispatch:      # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Required to push the CSV back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run script
        env:
          OZONETEL_API_KEY: ${{ secrets.OZONETEL_API_KEY }}
        run: python fetch_data.py

      - name: Commit and push CSV
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add report.csv
          git commit -m "Automated report update: $(date)" || echo "No changes to commit"
          git push
