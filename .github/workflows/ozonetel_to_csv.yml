name: Ozonetel → CSV

on:
  schedule:
    - cron: "0 1 * * *"   # daily
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Ozonetel data → CSV
        env:
          OZONETEL_API_KEY: ${{ secrets.OZONETEL_API_KEY }}
          OZONETEL_USERNAME: ${{ secrets.OZONETEL_USERNAME }}
          OZONETEL_DOMAIN: ${{ secrets.OZONETEL_DOMAIN }}
        run: python ozonetel_to_csv.py

      - name: Commit CSV
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/*.csv
          git commit -m "Daily Ozonetel summary CSV" || echo "No changes"
          git push
